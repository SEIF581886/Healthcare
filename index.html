<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Healthcare AI</title>
</head>
<body>

    <h1>Healthcare AI</h1>

    <button onclick="login()">تسجيل الدخول</button>

    <button onclick="testAI()">اختبار AI</button>

    <!-- Gammal Tech SDK -->
    <script src="https://api.gammal.tech/sdk-web.js"></script>

    <!-- Database -->
    <script src="User Database.js"></script>
    <script src="databaseUtils.js"></script>

    <!-- AI -->
    <script src="aiService.js"></script>

    <script>

        async function login() {

            try {

                // لا تعيد تسجيل الدخول إذا كان المستخدم مسجل بالفعل
                if (!GammalTech.isLoggedIn()) {
                    await GammalTech.login();
                }

                console.log("✅ Login Success");

            } catch (error) {

                console.error("❌ Login Error:", error);

            }

        }

    </script>

</body>
</html>
